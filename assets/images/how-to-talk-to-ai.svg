<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#F9F7F4" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">How to Ask AI the Right Way</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#666">More context = better results. Every time.</text>

  <!-- Column headers -->
  <rect x="30" y="78" width="358" height="36" fill="#c0392b" rx="8"/>
  <text x="209" y="101" text-anchor="middle" font-size="14" font-weight="bold" fill="white">❌  Vague Ask (what most people type)</text>

  <rect x="412" y="78" width="358" height="36" fill="#2D6A4F" rx="8"/>
  <text x="591" y="101" text-anchor="middle" font-size="14" font-weight="bold" fill="white">✅  Clear Ask (what actually works)</text>

  <!-- EXAMPLE 1 -->
  <rect x="30" y="122" width="358" height="64" fill="#fff5f5" rx="8" stroke="#f5c6c6" stroke-width="1"/>
  <text x="50" y="142" font-size="11" fill="#888">Email</text>
  <text x="50" y="160" font-size="13" fill="#c0392b" font-style="italic">"Write me an email."</text>
  <text x="50" y="178" font-size="11" fill="#999">→ AI has no idea who, what, or why</text>

  <text x="400" y="160" text-anchor="middle" font-size="20" fill="#ccc">→</text>

  <rect x="412" y="122" width="358" height="64" fill="#EDF7ED" rx="8" stroke="#c8e6c9" stroke-width="1"/>
  <text x="432" y="142" font-size="11" fill="#888">Email</text>
  <text x="432" y="160" font-size="12" fill="#2D6A4F" font-style="italic">"Write a short, warm follow-up email</text>
  <text x="432" y="176" font-size="12" fill="#2D6A4F" font-style="italic">to Rajesh who hasn't replied in 2 weeks."</text>

  <!-- EXAMPLE 2 -->
  <rect x="30" y="196" width="358" height="64" fill="#fff5f5" rx="8" stroke="#f5c6c6" stroke-width="1"/>
  <text x="50" y="216" font-size="11" fill="#888">Research</text>
  <text x="50" y="234" font-size="13" fill="#c0392b" font-style="italic">"Tell me about investing."</text>
  <text x="50" y="252" font-size="11" fill="#999">→ Too broad — you'll get a textbook chapter</text>

  <text x="400" y="234" text-anchor="middle" font-size="20" fill="#ccc">→</text>

  <rect x="412" y="196" width="358" height="64" fill="#EDF7ED" rx="8" stroke="#c8e6c9" stroke-width="1"/>
  <text x="432" y="216" font-size="11" fill="#888">Research</text>
  <text x="432" y="234" font-size="12" fill="#2D6A4F" font-style="italic">"I'm 45, earning ₹80k/month, want to start</text>
  <text x="432" y="250" font-size="12" fill="#2D6A4F" font-style="italic">investing. Suggest 3 simple options for beginners."</text>

  <!-- EXAMPLE 3 -->
  <rect x="30" y="270" width="358" height="64" fill="#fff5f5" rx="8" stroke="#f5c6c6" stroke-width="1"/>
  <text x="50" y="290" font-size="11" fill="#888">Planning</text>
  <text x="50" y="308" font-size="13" fill="#c0392b" font-style="italic">"Help me plan a trip."</text>
  <text x="50" y="326" font-size="11" fill="#999">→ Where? When? Budget? AI can't guess</text>

  <text x="400" y="308" text-anchor="middle" font-size="20" fill="#ccc">→</text>

  <rect x="412" y="270" width="358" height="64" fill="#EDF7ED" rx="8" stroke="#c8e6c9" stroke-width="1"/>
  <text x="432" y="290" font-size="11" fill="#888">Planning</text>
  <text x="432" y="308" font-size="12" fill="#2D6A4F" font-style="italic">"Plan a 4-day trip to Coorg for 2 adults,</text>
  <text x="432" y="324" font-size="12" fill="#2D6A4F" font-style="italic">budget ₹25,000, in December. We like nature."</text>

  <!-- EXAMPLE 4 -->
  <rect x="30" y="344" width="358" height="64" fill="#fff5f5" rx="8" stroke="#f5c6c6" stroke-width="1"/>
  <text x="50" y="364" font-size="11" fill="#888">Explaining</text>
  <text x="50" y="382" font-size="13" fill="#c0392b" font-style="italic">"Explain blockchain."</text>
  <text x="50" y="400" font-size="11" fill="#999">→ Generic, technical, probably confusing</text>

  <text x="400" y="382" text-anchor="middle" font-size="20" fill="#ccc">→</text>

  <rect x="412" y="344" width="358" height="64" fill="#EDF7ED" rx="8" stroke="#c8e6c9" stroke-width="1"/>
  <text x="432" y="364" font-size="11" fill="#888">Explaining</text>
  <text x="432" y="382" font-size="12" fill="#2D6A4F" font-style="italic">"Explain blockchain to me like I'm 12 years</text>
  <text x="432" y="398" font-size="12" fill="#2D6A4F" font-style="italic">old and have never heard of it."</text>

  <!-- The Formula -->
  <rect x="30" y="422" width="740" height="56" fill="#1a1a2e" rx="10"/>
  <text x="400" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="white">The simple formula: WHAT you need + WHO it's for + ANY important details</text>
  <text x="400" y="466" text-anchor="middle" font-size="12" fill="#aaa">That's it. No technical skills needed — just a little more context than you'd normally type.</text>

  <!-- Footer -->
  <text x="400" y="492" text-anchor="middle" font-size="10" fill="#bbb">money-and-mode.com — Fun in the Life</text>
</svg>
