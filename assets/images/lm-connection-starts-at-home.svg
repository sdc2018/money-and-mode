<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="Georgia, serif">
  <rect width="800" height="460" fill="#F9F7F4" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Where Connection Is Born — And Where It Breaks Down</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#666" font-style="italic">Connection is a skill. It is learned at home — or not learned at all.</text>

  <!-- Center: HOME -->
  <circle cx="400" cy="220" r="70" fill="#2D6A4F"/>
  <text x="400" y="210" text-anchor="middle" font-size="28" fill="white">🏠</text>
  <text x="400" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="white">HOME</text>
  <text x="400" y="253" text-anchor="middle" font-size="10" fill="#c8e6c9">Where it begins</text>

  <!-- Arrow lines from home outward -->
  <!-- Top: Self -->
  <line x1="400" y1="150" x2="400" y2="96" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="400,88 395,100 405,100" fill="#2D6A4F"/>

  <!-- Top-left: Spouse -->
  <line x1="352" y1="168" x2="255" y2="110" stroke="#457B9D" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="248,106 258,116 264,104" fill="#457B9D"/>

  <!-- Top-right: Children -->
  <line x1="448" y1="168" x2="545" y2="110" stroke="#8e44ad" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="552,106 542,116 536,104" fill="#8e44ad"/>

  <!-- Bottom-left: Community -->
  <line x1="352" y1="272" x2="200" y2="340" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="193,344 205,338 199,326" fill="#e67e22"/>

  <!-- Bottom-right: Society -->
  <line x1="448" y1="272" x2="600" y2="340" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="607,344 597,332 603,344" fill="#c0392b"/>

  <!-- Top: Self box -->
  <rect x="310" y="56" width="180" height="54" fill="#fff" rx="10" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="400" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D6A4F">Self — Values &amp; Beliefs</text>
  <text x="400" y="93" text-anchor="middle" font-size="10.5" fill="#555">Know what you stand for.</text>
  <text x="400" y="107" text-anchor="middle" font-size="10.5" fill="#555">Connection starts inside.</text>

  <!-- Top-left: Spouse box -->
  <rect x="80" y="72" width="170" height="56" fill="#fff" rx="10" stroke="#457B9D" stroke-width="1.5"/>
  <text x="165" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#457B9D">Spouse / Partner</text>
  <text x="165" y="108" text-anchor="middle" font-size="10.5" fill="#555">Emotional depth before</text>
  <text x="165" y="122" text-anchor="middle" font-size="10.5" fill="#555">logistics and routine.</text>

  <!-- Top-right: Children box -->
  <rect x="550" y="72" width="180" height="56" fill="#fff" rx="10" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="640" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Children</text>
  <text x="640" y="108" text-anchor="middle" font-size="10.5" fill="#555">They learn to connect by</text>
  <text x="640" y="122" text-anchor="middle" font-size="10.5" fill="#555">watching you connect.</text>

  <!-- Bottom-left: Community box -->
  <rect x="60" y="338" width="190" height="56" fill="#fff" rx="10" stroke="#e67e22" stroke-width="1.5"/>
  <text x="155" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Community</text>
  <text x="155" y="374" text-anchor="middle" font-size="10.5" fill="#555">Families that connect</text>
  <text x="155" y="388" text-anchor="middle" font-size="10.5" fill="#555">build stable communities.</text>

  <!-- Bottom-right: Society box -->
  <rect x="550" y="338" width="190" height="56" fill="#fff" rx="10" stroke="#c0392b" stroke-width="1.5"/>
  <text x="645" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Society</text>
  <text x="645" y="374" text-anchor="middle" font-size="10.5" fill="#555">Connected families →</text>
  <text x="645" y="388" text-anchor="middle" font-size="10.5" fill="#555">connected societies.</text>

  <!-- Bottom insight bar -->
  <rect x="30" y="408" width="740" height="40" fill="#1a1a2e" rx="10"/>
  <text x="400" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="white">The circle expands outward — but it only works if the centre holds.</text>
  <text x="400" y="442" text-anchor="middle" font-size="11.5" fill="#aaa">Self → Family → Community → Society. Each layer feeds the next.</text>

  <text x="400" y="457" text-anchor="middle" font-size="10" fill="#bbb">money-and-mode.com — Fun in the Life</text>
</svg>
