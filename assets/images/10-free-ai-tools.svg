<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="540" fill="#F9F7F4" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">10 Free AI Tools Worth Trying</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#666">No credit card. No tech skills. Just pick one and start.</text>

  <!-- ROW 1: Tools 1-3 -->
  <!-- Tool 1: ChatGPT -->
  <rect x="30" y="78" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="78" width="228" height="30" fill="#E76F51" rx="10 10 0 0"/>
  <text x="54" y="98" font-size="12" font-weight="bold" fill="white">1. ChatGPT</text>
  <text x="225" y="98" text-anchor="end" font-size="10" fill="#ffe0d8">by OpenAI</text>
  <text x="44" y="122" font-size="11" fill="#444">Write, research, explain, brainstorm</text>
  <text x="44" y="138" font-size="11" fill="#444">— the most popular AI assistant</text>
  <text x="44" y="156" font-size="10" fill="#E76F51">Best for: everyone starting out</text>

  <!-- Tool 2: Claude -->
  <rect x="286" y="78" width="228" height="86" fill="white" rx="10" stroke="#2D6A4F" stroke-width="2"/>
  <rect x="286" y="78" width="228" height="30" fill="#2D6A4F" rx="10 10 0 0"/>
  <text x="310" y="98" font-size="12" font-weight="bold" fill="white">2. Claude ⭐ Sandip's pick</text>
  <text x="300" y="122" font-size="11" fill="#444">Long documents, nuanced thinking,</text>
  <text x="300" y="138" font-size="11" fill="#444">writing that sounds human</text>
  <text x="300" y="156" font-size="10" fill="#2D6A4F">Best for: writing &amp; deep thinking</text>

  <!-- Tool 3: Google Gemini -->
  <rect x="542" y="78" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="542" y="78" width="228" height="30" fill="#555" rx="10 10 0 0"/>
  <text x="566" y="98" font-size="12" font-weight="bold" fill="white">3. Google Gemini</text>
  <text x="737" y="98" text-anchor="end" font-size="10" fill="#ddd">by Google</text>
  <text x="556" y="122" font-size="11" fill="#444">Linked to Gmail, Docs &amp; Search</text>
  <text x="556" y="138" font-size="11" fill="#444">— great if you use Google daily</text>
  <text x="556" y="156" font-size="10" fill="#555">Best for: Google Workspace users</text>

  <!-- ROW 2: Tools 4-6 -->
  <rect x="30" y="178" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="178" width="228" height="30" fill="#E76F51" rx="10 10 0 0"/>
  <text x="54" y="198" font-size="12" font-weight="bold" fill="white">4. Canva AI</text>
  <text x="44" y="222" font-size="11" fill="#444">Design posts, presentations,</text>
  <text x="44" y="238" font-size="11" fill="#444">and graphics with AI assistance</text>
  <text x="44" y="256" font-size="10" fill="#E76F51">Best for: design &amp; visual content</text>

  <rect x="286" y="178" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="286" y="178" width="228" height="30" fill="#E76F51" rx="10 10 0 0"/>
  <text x="310" y="198" font-size="12" font-weight="bold" fill="white">5. Perplexity</text>
  <text x="300" y="222" font-size="11" fill="#444">AI-powered search with sources</text>
  <text x="300" y="238" font-size="11" fill="#444">cited — more trustworthy results</text>
  <text x="300" y="256" font-size="10" fill="#E76F51">Best for: research &amp; fact-finding</text>

  <rect x="542" y="178" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="542" y="178" width="228" height="30" fill="#555" rx="10 10 0 0"/>
  <text x="566" y="198" font-size="12" font-weight="bold" fill="white">6. Otter.ai</text>
  <text x="556" y="222" font-size="11" fill="#444">Records meetings and turns</text>
  <text x="556" y="238" font-size="11" fill="#444">speech into written notes</text>
  <text x="556" y="256" font-size="10" fill="#555">Best for: meetings &amp; calls</text>

  <!-- ROW 3: Tools 7-9 -->
  <rect x="30" y="278" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="278" width="228" height="30" fill="#2D6A4F" rx="10 10 0 0"/>
  <text x="54" y="298" font-size="12" font-weight="bold" fill="white">7. Grammarly</text>
  <text x="44" y="322" font-size="11" fill="#444">Fixes your writing in real time —</text>
  <text x="44" y="338" font-size="11" fill="#444">grammar, tone, clarity</text>
  <text x="44" y="356" font-size="10" fill="#2D6A4F">Best for: emails &amp; documents</text>

  <rect x="286" y="278" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="286" y="278" width="228" height="30" fill="#2D6A4F" rx="10 10 0 0"/>
  <text x="310" y="298" font-size="12" font-weight="bold" fill="white">8. Notion AI</text>
  <text x="300" y="322" font-size="11" fill="#444">Write, plan, summarise inside</text>
  <text x="300" y="338" font-size="11" fill="#444">your notes and workspace</text>
  <text x="300" y="356" font-size="10" fill="#2D6A4F">Best for: notes &amp; planning</text>

  <rect x="542" y="278" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="542" y="278" width="228" height="30" fill="#2D6A4F" rx="10 10 0 0"/>
  <text x="566" y="298" font-size="12" font-weight="bold" fill="white">9. Microsoft Copilot</text>
  <text x="556" y="322" font-size="11" fill="#444">AI inside Word, Excel, Outlook</text>
  <text x="556" y="338" font-size="11" fill="#444">— free with Microsoft account</text>
  <text x="556" y="356" font-size="10" fill="#2D6A4F">Best for: Microsoft Office users</text>

  <!-- ROW 4: Tool 10 + advice -->
  <rect x="30" y="378" width="228" height="86" fill="white" rx="10" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="378" width="228" height="30" fill="#555" rx="10 10 0 0"/>
  <text x="54" y="398" font-size="12" font-weight="bold" fill="white">10. DeepL</text>
  <text x="44" y="422" font-size="11" fill="#444">Translates text with remarkable</text>
  <text x="44" y="438" font-size="11" fill="#444">accuracy — better than Google</text>
  <text x="44" y="456" font-size="10" fill="#555">Best for: translation tasks</text>

  <!-- Advice box -->
  <rect x="286" y="378" width="484" height="86" fill="#2D6A4F" rx="10"/>
  <text x="528" y="402" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Sandip's honest advice:</text>
  <text x="528" y="424" text-anchor="middle" font-size="12" fill="#c8e6c9">Don't try all ten. Pick one. Use it every day for two weeks.</text>
  <text x="528" y="444" text-anchor="middle" font-size="12" fill="#c8e6c9">Start with Claude or ChatGPT — they do the most.</text>
  <text x="528" y="462" text-anchor="middle" font-size="11" fill="#81c784">Once it's a habit, try one more.</text>

  <!-- Footer -->
  <text x="400" y="530" text-anchor="middle" font-size="10" fill="#bbb">money-and-mode.com — Fun in the Life</text>
</svg>
