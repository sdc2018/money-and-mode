<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="Georgia, serif">
  <rect width="800" height="420" fill="#F9F7F4" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Two Calendars. Two Different Lives.</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#666" font-style="italic">The calendar is the most visible symbol of financial freedom — or the lack of it.</text>

  <!-- LEFT SIDE: Financially Unfree Calendar -->
  <rect x="30" y="72" width="350" height="290" fill="#fff" rx="12" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="30" y="72" width="350" height="40" fill="#c0392b" rx="12"/>
  <rect x="30" y="100" width="350" height="12" fill="#c0392b"/>
  <text x="205" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Before Financial Freedom</text>

  <!-- Calendar blocks - packed -->
  <rect x="45" y="124" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="143" font-size="11.5" fill="#c0392b">9:00 — Weekly status meeting (mandatory)</text>

  <rect x="45" y="158" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="177" font-size="11.5" fill="#c0392b">10:30 — Client call (you can't say no)</text>

  <rect x="45" y="192" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="211" font-size="11.5" fill="#c0392b">12:00 — Team standup</text>

  <rect x="45" y="226" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="245" font-size="11.5" fill="#c0392b">2:00 — Manager 1:1 (can't miss)</text>

  <rect x="45" y="260" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="279" font-size="11.5" fill="#c0392b">3:30 — Budget review (3rd this week)</text>

  <rect x="45" y="294" width="310" height="28" fill="#ffcdd2" rx="4"/>
  <text x="55" y="313" font-size="11.5" fill="#c0392b">5:00 — Urgent call from boss</text>

  <text x="205" y="346" text-anchor="middle" font-size="11" fill="#999" font-style="italic">Your time belongs to whoever pays you.</text>
  <text x="205" y="362" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">0 blocks you truly own.</text>

  <!-- RIGHT SIDE: Financially Free Calendar -->
  <rect x="420" y="72" width="350" height="290" fill="#fff" rx="12" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="420" y="72" width="350" height="40" fill="#2D6A4F" rx="12"/>
  <rect x="420" y="100" width="350" height="12" fill="#2D6A4F"/>
  <text x="595" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="white">After Financial Freedom</text>

  <!-- Calendar blocks - free -->
  <rect x="435" y="124" width="310" height="28" fill="#e8f5e9" rx="4"/>
  <text x="445" y="143" font-size="11.5" fill="#2D6A4F">9:00 — Morning walk. No phone.</text>

  <rect x="435" y="158" width="235" height="28" fill="#c8e6c9" rx="4"/>
  <text x="445" y="177" font-size="11.5" fill="#1b5e20">11:00 — Work on what excites me</text>
  <rect x="676" y="158" width="69" height="28" fill="#f5f5f5" rx="4"/>
  <text x="710" y="177" font-size="10" fill="#aaa" font-style="italic">optional</text>

  <rect x="435" y="192" width="310" height="28" fill="#e8f5e9" rx="4"/>
  <text x="445" y="211" font-size="11.5" fill="#2D6A4F">1:00 — Lunch with family (no rush)</text>

  <!-- White space block -->
  <rect x="435" y="226" width="310" height="60" fill="#fafafa" rx="4" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="590" y="252" text-anchor="middle" font-size="13" fill="#ccc">— White space —</text>
  <text x="590" y="270" text-anchor="middle" font-size="11" fill="#ccc" font-style="italic">Protected. Unapologetic.</text>

  <rect x="435" y="294" width="310" height="28" fill="#c8e6c9" rx="4"/>
  <text x="445" y="313" font-size="11.5" fill="#1b5e20">4:00 — School pickup. Present.</text>

  <text x="595" y="346" text-anchor="middle" font-size="11" fill="#999" font-style="italic">Your time is genuinely yours.</text>
  <text x="595" y="362" text-anchor="middle" font-size="11" fill="#2D6A4F" font-weight="bold">Every block chosen, not assigned.</text>

  <!-- Bottom insight -->
  <rect x="30" y="374" width="740" height="34" fill="#1a1a2e" rx="10"/>
  <text x="400" y="396" text-anchor="middle" font-size="12.5" font-weight="bold" fill="white">"We are not slaves to our calendars." — This becomes true the day you own your time.</text>

  <text x="400" y="416" text-anchor="middle" font-size="10" fill="#bbb">money-and-mode.com — Fun in the Life</text>
</svg>
